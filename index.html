/* Welcome App — Elegant Loft
   iOS-native vibes, warm & approachable
   All design tokens live here. */

:root {
  /* Warm neutral palette (oklch for harmony) */
  --bg: #F2EFEA;           /* warm bone */
  --surface: #FFFFFF;
  --surface-2: #FAF7F2;
  --ink: #1A1916;          /* warm near-black */
  --ink-2: #4A4845;
  --ink-3: #8A8782;
  --ink-4: #C7C3BC;
  --hairline: rgba(26, 25, 22, 0.08);

  /* Accent — terracotta, warm & welcoming */
  --accent: oklch(0.62 0.12 45);
  --accent-ink: #FFFFFF;
  --accent-soft: oklch(0.94 0.04 50);
  --accent-deep: oklch(0.48 0.14 40);

  /* Semantic */
  --ok: oklch(0.62 0.12 155);
  --warn: oklch(0.72 0.14 75);

  /* iOS radii */
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;

  /* Type */
  --ff: -apple-system, "SF Pro Display", "SF Pro Text", "Inter", system-ui, sans-serif;
  --ff-serif: "Fraunces", "New York", ui-serif, Georgia, serif;
}

/* Reset within the phone */
.app-root * { box-sizing: border-box; }
.app-root button { font: inherit; color: inherit; }
.app-root a { color: inherit; text-decoration: none; }

.app-root {
  font-family: var(--ff);
  color: var(--ink);
  background: var(--bg);
  height: 100%;
  letter-spacing: -0.01em;
  -webkit-font-smoothing: antialiased;
}

/* Screen scrolling container */
.screen-scroll {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.screen-scroll::-webkit-scrollbar { display: none; width: 0; height: 0; }
/* Hide ALL scrollbars in the app */
.app-root *::-webkit-scrollbar { display: none; width: 0; height: 0; }
.app-root * { scrollbar-width: none; -ms-overflow-style: none; }

/* Page transition */
@keyframes slideInRight {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
@keyframes slideInUp {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.page-enter { opacity: 1; }
.sheet-enter { opacity: 1; }

/* Card */
.card {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 18px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 8px 24px rgba(26,25,22,0.06);
}

.card-tight {
  background: var(--surface);
  border-radius: var(--r-lg);
  overflow: hidden;
}

/* iOS grouped list row */
.row {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 56px;
  padding: 10px 16px;
  position: relative;
}
.row + .row::before {
  content: "";
  position: absolute;
  top: 0; left: 60px; right: 0;
  height: 0.5px;
  background: var(--hairline);
}

/* Chip */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  background: var(--accent-soft);
  color: var(--accent-deep);
  letter-spacing: 0;
}
.chip-ghost {
  background: rgba(26,25,22,0.05);
  color: var(--ink-2);
}
.chip-ok { background: oklch(0.94 0.05 155); color: oklch(0.38 0.1 155); }

/* Button */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 50px;
  padding: 0 22px;
  border-radius: 16px;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.2px;
  border: none;
  cursor: pointer;
  transition: transform .12s ease, background .15s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--ink); color: #fff; }
.btn-accent  { background: var(--accent); color: var(--accent-ink); }
.btn-ghost   { background: rgba(26,25,22,0.06); color: var(--ink); }
.btn-lg      { min-height: 56px; font-size: 17px; border-radius: 18px; }
.btn-full    { width: 100%; }

/* Serif title, big and warm */
.serif {
  font-family: var(--ff-serif);
  font-weight: 500;
  letter-spacing: -0.015em;
  font-optical-sizing: auto;
}

/* Skeleton line */
.sk {
  background: linear-gradient(90deg, #e9e5df 0%, #f2efe9 50%, #e9e5df 100%);
  background-size: 200% 100%;
  animation: sk 1.4s infinite;
  border-radius: 6px;
}
@keyframes sk { to { background-position: -200% 0; } }

/* Image placeholder (striped) */
.img-placeholder {
  background-image: repeating-linear-gradient(
    135deg,
    #e5e0d7 0, #e5e0d7 8px,
    #efebe3 8px, #efebe3 16px
  );
  color: var(--ink-3);
  font-family: ui-monospace, "SF Mono", monospace;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 12px;
}

/* Tab bar (bottom) */
.tabbar {
  position: absolute;
  left: 10px; right: 10px;
  bottom: max(8px, env(safe-area-inset-bottom));
  height: 70px;
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 6px 14px;
  z-index: 30;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: rgba(255,255,255,0.75);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.7) inset,
    0 -0.5px 0 rgba(0,0,0,0.04) inset,
    0 8px 32px rgba(26,25,22,0.1);
}
.tabitem {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px 0;
  color: var(--ink-3);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: none;
  border: none;
}
.tabitem[data-active="true"] { color: var(--accent); }

/* Nav bar (simple) */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px 4px;
  min-height: 44px;
}
.nav-btn {
  width: 36px; height: 36px;
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(26,25,22,0.06);
  border: none; cursor: pointer;
  color: var(--ink);
}
.nav-title {
  font-size: 16px;
  font-weight: 600;
}

/* Large title style */
.large-title {
  font-family: var(--ff-serif);
  font-size: 36px;
  font-weight: 500;
  line-height: 1.05;
  letter-spacing: -0.025em;
  color: var(--ink);
}

.muted { color: var(--ink-3); }
.muted-2 { color: var(--ink-2); }

/* Divider */
.hairline { height: 0.5px; background: var(--hairline); }

/* Itinerary mood card */
.mood-card {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(26,25,22,0.18);
  transition: transform .4s cubic-bezier(.2,.8,.2,1), opacity .3s;
  cursor: grab;
  user-select: none;
}

/* Utility */
.flex { display: flex; }
.col { flex-direction: column; }
.gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; }
.gap-10 { gap: 10px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.grow { flex: 1; }
.px-16 { padding-left: 16px; padding-right: 16px; }
.py-12 { padding-top: 12px; padding-bottom: 12px; }

/* Text sizes */
.t-11 { font-size: 11px; }
.t-12 { font-size: 12px; }
.t-13 { font-size: 13px; }
.t-14 { font-size: 14px; }
.t-15 { font-size: 15px; }
.t-17 { font-size: 17px; }
.t-20 { font-size: 20px; }
.t-22 { font-size: 22px; line-height: 1.15; }
.t-28 { font-size: 28px; line-height: 1.1; }
.w-500 { font-weight: 500; }
.w-600 { font-weight: 600; }
.w-700 { font-weight: 700; }

/* Weather/today hero */
.hero {
  border-radius: var(--r-xl);
  padding: 20px;
  color: #fff;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(140% 100% at 0% 0%, rgba(255,255,255,0.25), transparent 50%),
    linear-gradient(135deg, oklch(0.58 0.1 40) 0%, oklch(0.42 0.12 30) 100%);
}
.hero-bone {
  background: linear-gradient(180deg, #E8DFD1 0%, #D9CCB6 100%);
  color: var(--ink);
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',

      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'

      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {

        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',

}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';

function IOSDevice({

function IOSKeyboard({ dark = false }) {

    <div key={k} style={{
      height: 42, borderRadius: 8.5,

        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',

      {/* autocorrect bar */}

          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

// Canvas helpers for coupon image generation
function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = String(text).split(" ");
  let line = "";
  let yy = y;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + " ";
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line.trim(), x, yy);
      line = words[i] + " ";
      yy += lineH;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), x, yy);
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// Saved itineraries helpers
const ITIN_STORAGE = "elegant-loft-itineraries";
window.loadItineraries = function() {
  try { return JSON.parse(localStorage.getItem(ITIN_STORAGE) || "[]"); } catch { return []; }
};
window.saveItinerary = function(itin) {
  const list = window.loadItineraries();
  list.unshift({ ...itin, id: Date.now().toString(), savedAt: new Date().toISOString() });
  try { localStorage.setItem(ITIN_STORAGE, JSON.stringify(list.slice(0, 30))); } catch {}
  return list;
};
window.deleteItinerary = function(id) {
  const list = window.loadItineraries().filter(i => i.id !== id);
  try { localStorage.setItem(ITIN_STORAGE, JSON.stringify(list)); } catch {}
  return list;
};

// Multi-day swipeable result view
function ItineraryDays({ mood, plans, days, back, go, reopen }) {
  const [dayIdx, setDayIdx] = React.useState(0);
  const [touchStart, setTouchStart] = React.useState(null);
  const [saved, setSaved] = React.useState(!!reopen);
  const plan = plans[dayIdx];

  const onSave = () => {
    if (saved) return;
    window.saveItinerary({ mood, days });
    setSaved(true);
  };

  const onTouchStart = (e) => setTouchStart(e.touches[0].clientX);
  const onTouchEnd = (e) => {
    if (touchStart === null) return;
    const dx = e.changedTouches[0].clientX - touchStart;
    if (Math.abs(dx) > 50) {
      if (dx < 0 && dayIdx < plans.length - 1) setDayIdx(dayIdx + 1);else
      if (dx > 0 && dayIdx > 0) setDayIdx(dayIdx - 1);
    }
    setTouchStart(null);
  };

  return (
    <div>
      {/* Header */}
      <div style={{ padding: "8px 20px 8px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>

          Cambia

        <div className="serif" style={{ fontSize: 28, lineHeight: 1.1, fontWeight: 500 }}>
          {plans.length === 1 ? "La tua " : `Giorno ${dayIdx + 1} di ${plans.length} — la tua `}
          <em style={{ fontStyle: "italic", color: "var(--accent)" }}>giornata</em>.
        </div>
        <div className="t-13 muted" style={{ marginTop: 8, lineHeight: 1.5 }}>
          {plan.length} tappe.{plans.length > 1 ? " Scorri ← → per gli altri giorni." : ""}
        </div>
      </div>

      {/* Day tabs (clickable + visual) */}
      {plans.length > 1 &&
      <div style={{ padding: "16px 16px 0", display: "flex", gap: 6 }}>
          {plans.map((_, i) =>
        <button key={i} onClick={() => setDayIdx(i)} style={{
          flex: 1, padding: "10px 6px", borderRadius: 12, border: "none", cursor: "pointer",
          background: dayIdx === i ? "var(--accent)" : "rgba(26,25,22,0.06)",

function ItineraryMap({ plan }) {
  // Distribute pins along a route
  const positions = [
  { top: "30%", left: "30%" },
  { top: "55%", left: "50%" },
  { top: "40%", left: "68%" },
  { top: "70%", left: "40%" }];

  const pins = plan.slice(0, 4).map((p, i) => ({
    id: "p" + i, ...positions[i % positions.length], name: p.title
  }));
  // Build a dashed path through them
  const coords = pins.map((p, i) => {
    const x = parseFloat(p.left) * 4;
    const y = parseFloat(p.top) * 8;
    return `${i === 0 ? "M" : "L"}${x} ${y}`;
  }).join(" ");
  return (
    <MapBg pins={pins} path={{ d: coords }} numbered={true}
    userPin={{ top: "50%", left: "15%" }} />);

}

          {s.t}
        </div>
        <div className="t-15 muted-2" style={{ marginTop: 14, lineHeight: 1.55 }}>
          {s.d}
        </div>
      </div>

      <div style={{ padding: "32px 16px 0", display: "flex", gap: 10 }}>
        {i > 0 &&
        <button onClick={() => setI(i - 1)} className="btn btn-ghost btn-lg" style={{ flexShrink: 0, width: 50 }}>
            <IconChevronL size={18} stroke={2.5} />
          </button>
        }
        {i < steps.length - 1 ?
        <button onClick={() => setI(i + 1)} className="btn btn-accent btn-lg grow">
            Fatto, avanti <IconChevronR size={16} stroke={2.5} />
          </button> :

        <button onClick={back} className="btn btn-accent btn-lg grow">
            <IconCheck size={18} stroke={2.5} /> Sono dentro!
          </button>
        }
      </div>
    </div>);

}

      return () => clearTimeout(t);

function DailyTip({ back, go }) {
  const [tip, setTip] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [err, setErr] = React.useState(false);

  const fetchTip = async () => {
    setLoading(true); setErr(false);
    try {
      const now = new Date();
      const hh = now.getHours();
      const timeContext = hh < 11 ? "mattina presto" : hh < 14 ? "mezzogiorno" : hh < 18 ? "pomeriggio" : hh < 21 ? "ora di aperitivo" : "sera";
      const dayName = ["domenica", "lunedì", "martedì", "mercoledì", "giovedì", "venerdì", "sabato"][now.getDay()];
      const month = ["gennaio", "febbraio", "marzo", "aprile", "maggio", "giugno", "luglio", "agosto", "settembre", "ottobre", "novembre", "dicembre"][now.getMonth()];

      const reply = await window.claude.complete({
        messages: [{
          role: "user",
          content: `Sei un amico padovano che dà UN solo consiglio breve e ispirante su cosa fare a Padova ORA. 
Contesto: è ${dayName}, ${timeContext}, mese di ${month}.
L'ospite alloggia in Via Trieste 25.
Suggerisci UNA cosa specifica (un locale, un luogo, un'attività) che si possa fare nelle prossime 1-3 ore. Sii creativo: varia tra cose iconiche e perle nascoste.

Rispondi in formato JSON valido:
{
  "title": "titolo breve, max 6 parole, evocativo",
  "subtitle": "un dettaglio o ora consigliata, max 10 parole",
  "body": "2-3 frasi corte, tono amico locale, max 60 parole. Spiega perché è una buona idea proprio adesso.",
  "tag": "una sola parola tipo Caffè, Arte, Aperitivo, Verde, Vista...",
  "emoji": "una sola emoji"
}
Solo JSON, nessun altro testo.`
        }]
      });

      // Parse JSON, fallback to plain text
      const match = reply.match(/\{[\s\S]*\}/);
      if (match) {
        const data = JSON.parse(match[0]);
        setTip(data);
      } else {
        setTip({ title: "Un giro per il centro", subtitle: "Adesso è un buon momento", body: reply, tag: "Padova", emoji: "✨" });
      }
    } catch (e) {
      setErr(true);
    } finally {
      setLoading(false);
    }
  };

  React.useEffect(() => { fetchTip(); }, []);

  return (
    <div className="screen-scroll page-enter" style={{ paddingBottom: 110 }}>
      <NavBar back={back} title="Cosa fare oggi" />

      <div style={{ padding: "0 20px" }}>
        <div className="serif" style={{ fontSize: 32, lineHeight: 1.05, fontWeight: 500 }}>
          Il consiglio <em style={{ fontStyle: "italic", color: "var(--accent)" }}>di oggi</em>.
        </div>
        <div className="t-13 muted" style={{ marginTop: 8, lineHeight: 1.5 }}>
          Pensato per quest'ora, qui e ora — tocca per averne un altro.
        </div>
      </div>

      {loading && (
        <div style={{ padding: "60px 20px", textAlign: "center" }}>
          <div style={{
            width: 44, height: 44, borderRadius: 999, border: "3px solid var(--ink-4)",
            borderTopColor: "var(--accent)", animation: "sp 0.9s linear infinite", margin: "0 auto",
          }}/>
          <style>{`@keyframes sp { to { transform: rotate(360deg); } }`}</style>
          <div className="t-14 muted" style={{ marginTop: 16 }}>Sto pensando…</div>
        </div>
      )}

      {!loading && tip && (
        <>
          {/* Big tip card */}
          <div style={{ padding: "24px 16px 0" }}>
            <div style={{
              position: "relative", overflow: "hidden",
              borderRadius: 26, padding: "28px 22px",
              background: "linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%)",
              color: "#fff",
            }}>
              <div style={{
                position: "absolute", right: -40, top: -40, width: 200, height: 200,
                borderRadius: 999, background: "rgba(255,255,255,0.15)", pointerEvents: "none",
              }}/>
              <div style={{ position: "relative" }}>
                <div style={{ fontSize: 56, lineHeight: 1, marginBottom: 14 }}>{tip.emoji}</div>
                <div style={{
                  display: "inline-flex", padding: "5px 12px", borderRadius: 999,
                  background: "rgba(255,255,255,0.2)", backdropFilter: "blur(10px)",
                  fontSize: 11, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase",
                }}>{tip.tag}</div>
                <div className="serif" style={{ fontSize: 30, lineHeight: 1.1, fontWeight: 500, marginTop: 14 }}>
                  {tip.title}
                </div>
                <div className="t-13" style={{ opacity: 0.85, marginTop: 8 }}>
                  {tip.subtitle}
                </div>
                <div className="t-15" style={{ marginTop: 18, lineHeight: 1.55, opacity: 0.95 }}>
                  {tip.body}
                </div>
              </div>
            </div>
          </div>

          {/* Another tip */}
          <div style={{ padding: "16px 16px 0" }}>
            <button onClick={fetchTip} className="btn btn-ghost btn-lg btn-full">
              <IconSparkle size={18} stroke={2}/> Dammene un altro
            </button>
          </div>

          {/* Or build a full itinerary */}
          <div style={{ padding: "26px 20px 0" }}>
            <div className="t-13 muted" style={{ lineHeight: 1.5, marginBottom: 14 }}>
              Vuoi un programma completo della giornata?
            </div>
            <button onClick={() => go("itinerary")} className="btn btn-primary btn-lg btn-full">
              Crea un itinerario su misura →
            </button>
          </div>
        </>
      )}

      {err && (
        <div style={{ padding: "40px 20px", textAlign: "center" }}>
          <div className="t-14 muted" style={{ lineHeight: 1.5 }}>
            Non riesco a connettermi al momento.<br/>Riprova o crea un itinerario.
          </div>
          <button onClick={fetchTip} className="btn btn-ghost btn-lg" style={{ marginTop: 20 }}>
            Riprova
          </button>
        </div>
      )}
    </div>
  );

function Host({ back, guest }) {
  const name = guest?.firstName || AP.guest.firstName;
  const [msgs, setMsgs] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("elegant-loft-chat") || "null");
      if (saved && saved.length) return saved;
    } catch {}
    return [
    { from: "ai", text: `Ciao ${name}! Sono il Concierge del Loft ✨ Posso suggerirti dove mangiare, come arrivare ovunque, o aiutarti con la casa. Cosa ti serve?` }];

  });
  const [draft, setDraft] = React.useState("");
  const [typing, setTyping] = React.useState(false);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    try {localStorage.setItem("elegant-loft-chat", JSON.stringify(msgs));} catch {}
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs, typing]);

  const systemContext = () => {
    const rules = window.HOUSE_RULES.map((r) => `• ${r.t}: ${r.d}`).join("\n");
    const appliances = window.APPLIANCES.map((a) => `• ${a.t}: ${a.desc}`).join("\n");
    return `Sei il Concierge AI dell'appartamento "Elegant Loft" a Padova, in Via Trieste 25.
Rispondi sempre in italiano (o nella lingua dell'utente) con tono caldo, breve, di amico locale. Mai formale, mai elenchi puntati lunghi. Frasi corte. Una emoji ogni tanto, non di più.
Non inventare informazioni. Se non sai, dillo e suggerisci di scrivere a Mattia l'host al +39 351 988 6489.

Ospite: ${name}, ${guest?.nights || 3} notti.
Wi-Fi: ${AP.wifi.ssid} / password ${AP.wifi.password}.
Check-in dalle ${AP.checkin.from}, check-out entro ${AP.checkout.until}.

REGOLE DELLA CASA:
${rules}

ELETTRODOMESTICI:
${appliances}

Luoghi consigliati: Cappella degli Scrovegni, Prato della Valle, Orto Botanico, Caffè Pedrocchi, Basilica di Sant'Antonio, Palazzo della Ragione.`;
  };

  const send = async (textOverride) => {
    const text = (textOverride ?? draft).trim();
    if (!text || typing) return;
    const newMsgs = [...msgs, { from: "me", text }];
    setMsgs(newMsgs);
    setDraft("");
    setTyping(true);

    try {
      const conversation = newMsgs.slice(-10).map((m) => ({
        role: m.from === "me" ? "user" : "assistant",
        content: m.text
      }));
      const reply = await window.claude.complete({
        messages: [
        { role: "user", content: systemContext() + "\n\n---\n\nRispondi al prossimo messaggio dell'utente con tono breve e diretto." },
        ...conversation]

      });
      setMsgs((m) => [...m, { from: "ai", text: (reply || "Scusa, riprova tra un attimo 🙏").trim() }]);
    } catch (e) {
      setMsgs((m) => [...m, { from: "ai", text: "Ops, problema di connessione. Riprova, o scrivi a Mattia al +39 351 988 6489." }]);
    } finally {
      setTyping(false);
    }
  };

  return (
    <div className="page-enter" style={{ display: "flex", flexDirection: "column", height: "100%", background: "var(--bg)" }}>
      {/* Compact header bar */}
      <div style={{
        display: "flex", alignItems: "center", gap: 12,
        padding: "56px 16px 12px",
        background: "linear-gradient(180deg, var(--bg) 70%, rgba(242,239,234,0) 100%)",
        position: "sticky", top: 0, zIndex: 5
      }}>
        <button onClick={back} className="nav-btn" style={{ background: "rgba(255,255,255,0.85)", backdropFilter: "blur(12px)" }}>
          <IconChevronL size={18} stroke={2.5} />
        </button>
        <div style={{
          width: 38, height: 38, borderRadius: 12, flexShrink: 0,
          background: "linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%)",
          color: "#fff", display: "flex", alignItems: "center", justifyContent: "center"
        }}>
          <IconSparkle size={20} stroke={2} />
        </div>
        <div className="grow">
          <div className="t-15 w-600" style={{ lineHeight: 1.2 }}>Concierge AI</div>
          <div className="t-11 muted" style={{ marginTop: 2, display: "inline-flex", alignItems: "center", gap: 5 }}>
            <span style={{ width: 7, height: 7, borderRadius: 999, background: "var(--ok)" }} />
            Online · conosce la casa
          </div>
        </div>
      </div>

      <div ref={scrollRef} className="screen-scroll grow" style={{ padding: "4px 16px 8px", display: "flex", flexDirection: "column", gap: 8 }}>
        {msgs.map((m, i) =>
        <div key={i} style={{
          alignSelf: m.from === "me" ? "flex-end" : "flex-start",
          maxWidth: "82%",
          background: m.from === "me" ? "var(--accent)" : "#fff",
          color: m.from === "me" ? "#fff" : "var(--ink)",
          padding: "10px 14px", borderRadius: 18,
          borderBottomRightRadius: m.from === "me" ? 6 : 18,
          borderBottomLeftRadius: m.from === "me" ? 18 : 6,
          fontSize: 15, lineHeight: 1.45,
          boxShadow: m.from === "me" ? "none" : "0 1px 3px rgba(0,0,0,0.05)",
          whiteSpace: "pre-wrap"
        }}>{m.text}</div>
        )}
        {typing &&
        <div style={{

// COUPON DETAIL — large code, copy, multilingua

function CouponDetail({ back, item, guest }) {
  const c = item || window.COUPONS_RICH[0];
  const lang = guest?.lang || "it";
  const [downloaded, setDownloaded] = React.useState(false);

  const download = () => {
    const canvas = document.createElement("canvas");
    const W = 900, H = 1400;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    // Background — dark gradient
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, "#1A1916");
    bg.addColorStop(1, "#2F2A24");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Tint blob top-right
    const blob = ctx.createRadialGradient(W - 80, 100, 0, W - 80, 100, 360);
    blob.addColorStop(0, c.tint);
    blob.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = blob;
    ctx.globalAlpha = 0.55;
    ctx.fillRect(0, 0, W, 600);
    ctx.globalAlpha = 1;

    // Brand mark
    ctx.fillStyle = "#f3dfd9";
    ctx.font = "600 28px 'Segoe UI', system-ui, sans-serif";
    ctx.fillText("ELEGANT LOFT · " + (AP.pmName || "MOORENT").toUpperCase(), 60, 100);

    // "COUPON" label
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.font = "700 22px 'Segoe UI', system-ui, sans-serif";
    ctx.fillText("COUPON · " + (c.meta[lang] || c.meta.it).toUpperCase(), 60, 160);

    // Shop name (serif-ish)
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "500 64px Georgia, 'Times New Roman', serif";
    wrapText(ctx, c.shop, 60, 250, W - 120, 70);

    // Deal (big accent)
    ctx.fillStyle = c.tint;
    ctx.font = "700 120px Georgia, 'Times New Roman', serif";
    ctx.fillText(c.deal[lang] || c.deal.it, 60, 480);

    // Description
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.font = "400 28px 'Segoe UI', system-ui, sans-serif";
    wrapText(ctx, c.desc[lang] || c.desc.it, 60, 580, W - 120, 42);

    // Code card
    const codeY = 880;
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    roundRect(ctx, 60, codeY, W - 120, 220, 28);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.font = "700 22px 'Segoe UI', system-ui, sans-serif";
    ctx.fillText({ it: "CODICE COUPON", en: "COUPON CODE", de: "COUPON-CODE", fr: "CODE COUPON" }[lang] || "CODICE COUPON", 90, codeY + 60);
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "800 84px 'Courier New', monospace";
    ctx.fillText(c.code, 90, codeY + 160);

    // Address
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.font = "500 24px 'Segoe UI', system-ui, sans-serif";
    ctx.fillText("📍 " + c.address, 60, 1180);

    // Footer
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.font = "500 20px 'Segoe UI', system-ui, sans-serif";
    ctx.fillText({
      it: "Mostra questo coupon in cassa · elegantloft.it",
      en: "Show this coupon at the till · elegantloft.it",
      de: "Zeige diesen Coupon an der Kasse · elegantloft.it",
      fr: "Présente ce coupon en caisse · elegantloft.it"
    }[lang] || "", 60, 1340);

    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `coupon-${c.id}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, "image/png");

    setDownloaded(true);
    setTimeout(() => setDownloaded(false), 2500);
  };
  const L = {
    it: { useAt: "Usa qui", howUse: "Come usarlo", howUseDesc: "Mostra il coupon scaricato in cassa con il codice ben visibile. Il commerciante lo verifica con un tocco.", download: "Scarica coupon", downloaded: "Scaricato!" },
    en: { useAt: "Use at", howUse: "How to use", howUseDesc: "Show the downloaded coupon at the till with the code clearly visible.", download: "Download coupon", downloaded: "Downloaded!" },
    de: { useAt: "Gültig in", howUse: "Verwendung", howUseDesc: "Zeige den heruntergeladenen Coupon an der Kasse mit gut sichtbarem Code.", download: "Coupon herunterladen", downloaded: "Heruntergeladen!" },
    fr: { useAt: "À utiliser à", howUse: "Comment l'utiliser", howUseDesc: "Présente le coupon téléchargé en caisse avec le code bien visible.", download: "Télécharger", downloaded: "Téléchargé !" }
  }[lang] || {};

  return (
    <div className="screen-scroll page-enter" style={{ paddingBottom: 110 }}>
      {/* Hero */}
      <div style={{ position: "relative" }}>
        <div style={{
          height: 200,

          display: "flex", alignItems: "flex-end", padding: "20px 20px 24px"
        }}>
          <button onClick={back} className="nav-btn" style={{

          }}>
            <IconChevronL size={18} stroke={2.5} />
          </button>
          <div style={{ color: "#fff" }}>
            <div className="t-11 w-600" style={{ opacity: 0.85, textTransform: "uppercase", letterSpacing: 0.5 }}>{L.useAt}</div>
            <div className="serif" style={{ fontSize: 30, lineHeight: 1.1, fontWeight: 500, marginTop: 6 }}>{c.shop}</div>
          </div>
        </div>
      </div>

      <div style={{ padding: "20px 20px 0" }}>
        <div className="t-13 w-600" style={{ color: "var(--accent-deep)", textTransform: "uppercase", letterSpacing: 0.5 }}>
          {c.meta[lang] || c.meta.it}
        </div>
        <div className="serif" style={{ fontSize: 40, lineHeight: 1, fontWeight: 500, marginTop: 8 }}>
          {c.deal[lang] || c.deal.it}

      </div>

      {/* Code card */}
      <div style={{ padding: "24px 16px 0" }}>
        <div style={{
          borderRadius: 20, padding: "20px 18px",
          background: "linear-gradient(135deg, #1A1916 0%, #2F2A24 100%)",
          color: "#fff", position: "relative", overflow: "hidden"
        }}>
          <div style={{
            position: "absolute", right: -30, top: -30, width: 180, height: 180,
            borderRadius: 999, background: `radial-gradient(circle, ${c.tint} 0%, transparent 70%)`,
            opacity: 0.5

          <div className="t-11 w-600" style={{ opacity: 0.7, textTransform: "uppercase", letterSpacing: 0.5, position: "relative" }}>

          }}>
            {downloaded ? <><IconCheck size={14} stroke={3} /> {L.downloaded}</> : <><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v14M5 12l7 7 7-7M5 21h14"/></svg> {L.download}</>}

          <p style={{ fontSize: 14, color: "#aca5a5", lineHeight: 1.6, margin: 0 }}>
            Ti facciamo una stima personalizzata del rendimento. 15 minuti al telefono, e ti diciamo onestamente se possiamo aiutarti.

        <div className="moo-anim" style={{ padding: "20px 16px 0", display: "flex", flexDirection: "column", gap: 10, animationDelay: "1.1s" }}>

            background: "#232323", color: "#FFFFFF", padding: "16px 22px",
            borderRadius: 14, fontSize: 15, fontWeight: 700, textDecoration: "none",
            boxShadow: "0 8px 20px rgba(35,35,35,0.25)"
          }}>
            Visita {AP.website} <IconChevronR size={16} stroke={2.5} />
          </a>
          <a href="mailto:info@moorent.it" style={{
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            background: "#f3dfd9", color: "#232323", padding: "16px 22px",
            borderRadius: 14, fontSize: 15, fontWeight: 700, textDecoration: "none"
          }}>Scrivici a hello@moorentpm.it

          </a>

        {/* Footer micro */}
        <div style={{ padding: "36px 24px 24px", borderTop: "1px solid #f8f8f8", marginTop: 36 }}>

            {AP.pmName} · Padova, Italia<br />

        </div>
      </div>
    </div>);

}

// ─────────────────────────────────────────────────────

function Arrival({ back }) {

      <div style={{ padding: "0 20px" }}>
        <div className="serif" style={{ fontSize: 32, lineHeight: 1.05, fontWeight: 500 }}>
          Ci trovi <em style={{ fontStyle: "italic", color: "var(--accent)" }}>qui</em>.

Object.assign(window, {
  Itinerary, Checkin, Wifi, House, Places, Checkout, Review, Host, Arrival, PlaceDetail, NavBar,
  Appliance, About, CollapsibleSection, ArrivalCheckin, Coupons, TransportDetail, CouponDetail, DailyTip
});
  </script>

  <script type="text/babel" data-presets="react">
// app.jsx — Login flow + tab nav: Home(Chiavi) / Padova(map) / Itinerario / Concierge

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "stage": "stay",
  "accent": "terracotta",
  "skipLogin": false
}/*EDITMODE-END*/;

const ACCENTS = {
  terracotta: { name: "Terracotta", val: "oklch(0.62 0.12 45)",  soft: "oklch(0.94 0.04 50)",  deep: "oklch(0.48 0.14 40)" },
  olive:      { name: "Oliva",       val: "oklch(0.56 0.09 120)", soft: "oklch(0.94 0.04 120)", deep: "oklch(0.42 0.1 120)" },
  cobalt:     { name: "Cobalto",    val: "oklch(0.55 0.13 240)", soft: "oklch(0.94 0.04 240)", deep: "oklch(0.42 0.14 240)" },
  plum:       { name: "Prugna",      val: "oklch(0.48 0.1 340)",  soft: "oklch(0.94 0.04 340)", deep: "oklch(0.38 0.12 340)" },
};

function applyAccent(key) {
  const a = ACCENTS[key] || ACCENTS.terracotta;
  const r = document.documentElement.style;
  r.setProperty("--accent", a.val);
  r.setProperty("--accent-soft", a.soft);
  r.setProperty("--accent-deep", a.deep);
}

function TabBar({ active, onTab }) {
  const tabs = [
    { id: "home",      icon: IconHome,    label: "Home" },
    { id: "padova",    icon: IconMap,     label: "Padova" },
    { id: "itinerary", icon: IconSparkle, label: "Itinerario" },
    { id: "host",      icon: IconMsg,     label: "Concierge" },
  ];
  return (
    <div className="tabbar">
      {tabs.map(t => {
        const I = t.icon;
        const isActive = active === t.id;
        return (
          <button key={t.id} data-active={isActive} onClick={() => onTab(t.id)} className="tabitem">
            <I size={24} stroke={isActive ? 2.2 : 1.8}/>
            <span style={{ marginTop: 2 }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [guest, setGuest] = React.useState(() => window.loadGuest?.() || null);
  const [route, setRoute] = React.useState({ name: "home", params: null });
  const [history, setHistory] = React.useState([]);
  const [editOpen, setEditOpen] = React.useState(false);

  React.useEffect(() => { applyAccent(tweaks.accent); }, [tweaks.accent]);

  // Re-sync stage from tweaks when guest exists (for demo)
  React.useEffect(() => {
    if (guest && tweaks.stage && guest.stage !== tweaks.stage) {
      const g = { ...guest, stage: tweaks.stage };
      setGuest(g);
      window.saveGuest?.(g);
    }
  }, [tweaks.stage]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setEditOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setEditOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  React.useEffect(() => {
    if (tweaks.skipLogin && !guest) {
      const g = { code: "DEMO", firstName: "Giulia", nights: 3, stage: tweaks.stage };
      setGuest(g);
      window.saveGuest?.(g);
    }
  }, [tweaks.skipLogin]);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const go = (name, params = null) => {
    setHistory(h => [...h, route]);
    setRoute({ name, params });
  };
  const back = () => {
    setHistory(h => {
      if (h.length === 0) { setRoute({ name: "home", params: null }); return []; }
      const last = h[h.length - 1];
      setRoute(last);
      return h.slice(0, -1);
    });
  };
  const tab = (id) => {
    setHistory([]);
    setRoute({ name: id, params: null });
  };

  // Login gate
  if (!guest) {
    return (
      <div className="app-root" style={{ height: "100%", position: "relative" }}>
        <Login onLogin={g => setGuest({ ...g, stage: g.stage || tweaks.stage })} />
        {editOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} close={() => setEditOpen(false)} />}
      </div>
    );
  }

  let screen = null;
  const activeTab = ["home", "padova", "itinerary", "host"].includes(route.name) ? route.name : null;

  switch (route.name) {
    case "home":      screen = <HomeChiavi go={go} stage={guest.stage || tweaks.stage} guest={guest} />; break;
    case "padova":    screen = <Padova go={go} />; break;
    case "itinerary": screen = <Itinerary back={back} go={go} />; break;
    case "host":      screen = <Host back={back} guest={guest} />; break;
    case "checkin":   screen = <Checkin back={back} />; break;
    case "checkout":  screen = <Checkout back={back} go={go} />; break;
    case "wifi":      screen = <Wifi back={back} />; break;
    case "house":     screen = <House back={back} go={go} />; break;
    case "appliance": screen = <Appliance back={back} item={route.params} />; break;
    case "arrival":   screen = <ArrivalCheckin back={back} go={go} />; break;
    case "arrival_checkin": screen = <ArrivalCheckin back={back} go={go} />; break;
    case "transport": screen = <TransportDetail back={back} mode={route.params} />; break;
    case "coupons":   screen = <Coupons back={back} go={go} guest={guest} />; break;
    case "coupon":    screen = <CouponDetail back={back} item={route.params} guest={guest} />; break;
    case "coupon":    screen = <CouponDetail back={back} item={route.params} guest={guest} />; break;
    case "goodbye":   screen = <Review back={back} guest={guest} go={go} />; break;
    case "review":    screen = <Review back={back} guest={guest} go={go} />; break;
    case "place":     screen = <PlaceDetail back={back} place={route.params} />; break;
    case "places":    screen = <Places back={back} go={go} />; break;
    case "tip":       screen = <DailyTip back={back} go={go} />; break;
    case "about":     screen = <About back={back} />; break;
    case "coupons":   screen = <Coupons back={back} />; break;
    case "settings":  screen = <Settings back={back} guest={guest} onLogout={() => { window.clearGuest?.(); setGuest(null); }} onSave={(g) => { setGuest(g); window.saveGuest?.(g); }} />; break;
    default:          screen = <HomeChiavi go={go} stage={guest.stage || tweaks.stage} guest={guest} />;
  }

  return (
    <>
      <div className="app-root" data-screen-label={route.name} style={{ height: "100%", position: "relative" }}>
        {screen}
        <TabBar active={activeTab || "home"} onTab={tab} />
      </div>
      {editOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} close={() => setEditOpen(false)} />}
    </>
  );
}

function TweaksPanel({ tweaks, setTweak, close }) {
  return (
    <div style={{
      position: "fixed", bottom: 24, right: 24, zIndex: 9999,
      width: 300, background: "rgba(20,20,22,0.95)", color: "#fff",
      borderRadius: 22, padding: 18, backdropFilter: "blur(20px)",
      boxShadow: "0 20px 50px rgba(0,0,0,0.3)",
      fontFamily: "-apple-system, system-ui, sans-serif",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 15, fontWeight: 700 }}>Tweaks</div>
        <button onClick={close} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", width: 26, height: 26, borderRadius: 999, cursor: "pointer", fontSize: 14 }}>×</button>
      </div>

      <TweakRow label="Stato soggiorno">
        {[
          { v: "pre",  l: "Pre-arrivo" },
          { v: "stay", l: "Soggiorno" },
          { v: "out",  l: "Ultimo dì" },
        ].map(o => (
          <TweakPill key={o.v} active={tweaks.stage === o.v} onClick={() => setTweak("stage", o.v)}>{o.l}</TweakPill>
        ))}
      </TweakRow>

      <TweakRow label="Accent">
        {Object.entries(ACCENTS).map(([k, a]) => (
          <button key={k} onClick={() => setTweak("accent", k)} style={{
            width: 32, height: 32, borderRadius: 999, border: tweaks.accent === k ? "2px solid #fff" : "2px solid transparent",
            background: a.val, cursor: "pointer", boxShadow: "0 0 0 1px rgba(255,255,255,0.2)",
          }} title={a.name}/>
        ))}
      </TweakRow>

      <TweakRow label="Login">
        <TweakPill active={!tweaks.skipLogin} onClick={() => setTweak("skipLogin", false)}>Mostra</TweakPill>
        <TweakPill active={tweaks.skipLogin} onClick={() => setTweak("skipLogin", true)}>Salta</TweakPill>
      </TweakRow>
    </div>
  );
}

function TweakRow({ label, children }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 11, opacity: 0.6, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>{label}</div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>{children}</div>
    </div>
  );
}

function TweakPill({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding: "6px 12px", borderRadius: 999, border: "none",
      background: active ? "#fff" : "rgba(255,255,255,0.1)",
      color: active ? "#000" : "#fff",
      fontSize: 12, fontWeight: 600, cursor: "pointer",
    }}>{children}</button>
  );
}

function Settings({ back, guest, onLogout, onSave }) {
  const [name, setName] = React.useState(guest.firstName || "");
  const [checkin, setCheckin] = React.useState(guest.checkin || "");
  const [checkout, setCheckout] = React.useState(guest.checkout || "");
  const [lang, setLang] = React.useState(guest.lang || "it");
  const [savedNote, setSavedNote] = React.useState(false);

  const dirty = name !== (guest.firstName || "")
    || checkin !== (guest.checkin || "")
    || checkout !== (guest.checkout || "")
    || lang !== (guest.lang || "it");

  const save = () => {
    let nights = guest.nights;
    let stage = guest.stage;
    if (checkin && checkout) {
      const d1 = new Date(checkin), d2 = new Date(checkout);
      nights = Math.max(1, Math.round((d2 - d1) / (1000 * 60 * 60 * 24)));
      const today = new Date(); today.setHours(0, 0, 0, 0);
      if (today < d1) stage = "pre";
      else if (today >= d2) stage = "out";
      else stage = "stay";
    }
    onSave({
      ...guest,
      firstName: name.trim() || "Ospite",
      checkin, checkout, nights, stage, lang,
    });
    setSavedNote(true);
    setTimeout(() => setSavedNote(false), 1800);
  };

  return (
    <div className="screen-scroll" style={{ paddingBottom: 110 }}>
      <NavBar back={back} title="Profilo" />
      <div style={{ padding: "0 16px" }}>

        {/* Avatar header */}
        <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "6px 6px 18px" }}>
          <div style={{
            width: 56, height: 56, borderRadius: 999, flexShrink: 0,
            background: "linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%)",
            color: "#fff", display: "flex",
            alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 22,
          }}>{(name || "O")[0].toUpperCase()}</div>
          <div className="grow">
            <div className="t-17 w-600">{name || "Ospite"}</div>
            <div className="t-12 muted" style={{ marginTop: 2 }}>
              {guest.nights} {guest.nights === 1 ? "notte" : "notti"} · Padova
            </div>
          </div>
        </div>

        {/* Edit form */}
        <div className="t-13 w-600 muted" style={{ textTransform: "uppercase", letterSpacing: 0.5, padding: "0 6px 10px" }}>
          La tua prenotazione
        </div>
        <div className="card-tight" style={{ padding: 6 }}>
          <SettingsField label="Come ti chiamiamo" value={name} onChange={setName} placeholder="Il tuo nome" />
          <div style={{ display: "flex", gap: 0, borderTop: "0.5px solid var(--hairline)" }}>
            <SettingsField label="Check-in"  value={checkin}  onChange={setCheckin}  type="date" border={false} />
            <div style={{ width: "0.5px", background: "var(--hairline)" }}/>
            <SettingsField label="Check-out" value={checkout} onChange={setCheckout} type="date" border={false} />
          </div>
        </div>

        {/* Language */}
        <div className="t-13 w-600 muted" style={{ textTransform: "uppercase", letterSpacing: 0.5, padding: "24px 6px 10px" }}>Lingua</div>
        <div className="card-tight">
          {[
            { k: "it", label: "Italiano" },
            { k: "en", label: "English" },
            { k: "de", label: "Deutsch" },
            { k: "fr", label: "Français" },
          ].map((l) => (
            <button key={l.k} onClick={() => setLang(l.k)} className="row" style={{
              width: "100%", background: "none", border: "none", cursor: "pointer", textAlign: "left",
            }}>
              <div className="grow t-15">{l.label}</div>
              {lang === l.k && <IconCheck size={18} stroke={2.5} style={{ color: "var(--accent)" }}/>}
            </button>
          ))}
        </div>

        {/* Save sticky-ish bar */}
        <div style={{ padding: "24px 0 0" }}>
          <button onClick={save} disabled={!dirty && !savedNote} className="btn btn-accent btn-lg btn-full"
            style={{ opacity: dirty || savedNote ? 1 : 0.4, transition: "opacity .2s" }}>
            {savedNote ? <><IconCheck size={18} stroke={2.5}/> Salvato</> : "Salva modifiche"}
          </button>
        </div>

        <div style={{ padding: "12px 0 0" }}>
          <button onClick={onLogout} className="btn btn-ghost btn-lg btn-full">Esci</button>
        </div>
      </div>
    </div>
  );
}

function SettingsField({ label, value, onChange, placeholder, type = "text", border = true }) {
  return (
    <label style={{
      display: "block", padding: "10px 14px",
      borderTop: border ? "0.5px solid var(--hairline)" : "none",
      flex: type === "date" ? 1 : undefined,
    }}>
      <div className="t-11 w-600 muted" style={{ textTransform: "uppercase", letterSpacing: 0.4 }}>{label}</div>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        style={{
          width: "100%", border: "none", background: "transparent",
          fontSize: 15, fontFamily: "inherit", color: "var(--ink)",
          outline: "none", padding: "3px 0 0", boxSizing: "border-box",
        }}/>
    </label>
  );
}

Object.assign(window, { App, TabBar, Settings });

  </script>

  <script type="text/babel" data-presets="react">
    function AppShell() {
      return typeof App !== "undefined" ? <App /> : null;
    }
    function mount() {
      if (typeof App === "undefined") { setTimeout(mount, 50); return; }
      const hostRoot = ReactDOM.createRoot(document.getElementById("root-host"));
      hostRoot.render(<AppShell />);
    }
    setTimeout(mount, 50);
  </script>
</body>
